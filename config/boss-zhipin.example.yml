# BOSS直聘 (Boss Zhipin) Configuration Template
# Used by the boss-zhipin provider for scanning Chinese job listings.
#
# HOW TO USE:
#   1. Copy this file to config/boss-zhipin.yml
#   2. Customize search parameters below
#   3. In portals.yml, add entries with provider: boss-zhipin
#
# City Codes (BOSS直聘 Geocode System):
#   101010100 = Beijing (北京)
#   101020100 = Shanghai (上海)
#   101280100 = Guangzhou (广州)
#   101280600 = Shenzhen (深圳)
#   101210100 = Hangzhou (杭州)
#   101270100 = Chengdu (成都)
#   101110100 = Xi'an (西安)
#   101030100 = Tianjin (天津)
#   101190400 = Suzhou (苏州)
#   101200100 = Wuhan (武汉)
#   101250100 = Changsha (长沙)
#   101230200 = Xiamen (厦门)
#   101180100 = Zhengzhou (郑州)
#   101050100 = Harbin (哈尔滨)
#   101070100 = Dalian (大连)
#   101060100 = Shenyang (沈阳)
#   101120100 = Jinan (济南)
#   101170100 = Yinchuan (银川)
#   101160100 = Lanzhou (兰州)
#   101150100 = Xining (西宁)
#
# Experience Codes:
#   100 = 不限 (No requirement)
#   101 = 1年以内 (Under 1 year)
#   102 = 1-3年 (1-3 years)
#   105 = 3-5年 (3-5 years)
#   106 = 5-10年 (5-10 years)
#   107 = 10年以上 (10+ years)
#
# Salary Codes:
#   400 = 不限 (No requirement)
#   401 = 3K以下 (Under 3K)
#   402 = 3-5K
#   403 = 5-10K
#   404 = 10-20K
#   405 = 20-50K
#   406 = 50K以上 (50K+)

boss_zhipin:
  # Primary search configuration
  search:
    query: "前端工程师"          # Search keyword
    city: "101010100"            # Beijing
    experience: "105"            # 3-5 years
    salary: "405"                # 20-50K
    page: 1
    pagesize: 30

  # Job filtering (applied after fetching)
  filters:
    # Company filters (regex patterns)
    company_blacklist: []
      # - "外包"                # Exclude outsourcing companies
      # - ".*信息技术.*外包"    # Pattern matching
    company_whitelist: []
      # - "字节跳动"
      # - "阿里巴巴"
      # - "腾讯"
      # - "美团"
      # - "京东"

    # Title filters (regex patterns)
    title_include: []
      # - "工程师"
      # - "开发"
    title_exclude: []
      # - "实习"
      # - "初级"

    # Salary filter (monthly, in K RMB)
    min_salary: 0                # 0 = no minimum
    max_salary: 0                # 0 = no maximum

    # Activity filter
    boss_active_days: 0          # Only show bosses active within N days (0 = no filter)
